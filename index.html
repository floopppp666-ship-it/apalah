<!DOCTYPE html>
<html>
<head>
    <title>AI Nyolot</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; background: #121212; color: #fff; }
        #output { border: 1px solid #444; padding: 20px; width: 80%; margin: 20px auto; min-height: 100px; }
    </style>
</head>
<body>
    <h1>Tanya Sesuatu, Dasar Manusia!</h1>
    <input type="text" id="userInput" placeholder="Mau tanya apa?" style="width: 300px; padding: 10px;">
    <button onclick="jawab()">Tanya</button>
    <div id="output">...</div>

    <script>
        function jawab() {
            const input = document.getElementById('userInput').value;
            const output = document.getElementById('output');
            const jawabanNyolot = [
                "Duh, pertanyaan gitu aja nanya saya?",
                "Serius? Cuma itu yang ada di otak kamu?",
                "Baca buku deh, jangan males jadi orang.",
                "Kamu nanya saya karena nggak punya teman ya?",
                "Aduh, malas banget saya jawab pertanyaan ginian."
            ];
            const randomJawaban = jawabanNyolot[Math.floor(Math.random() * jawabanNyolot.length)];
            output.innerText = randomJawaban;
        }
    </script>
</body>
</html>
