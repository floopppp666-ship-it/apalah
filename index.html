<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>TEKNOSOUL // NEURAL_CORE_V18</title>
    <style>
        :root { --bg: #050505; --accent: #00ff41; --text: #d1d1d1; --bubble: #121212; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 15px 20px; border-radius: 8px; max-width: 85%; line-height: 1.6; border: 1px solid #333; }
        .user { align-self: flex-end; background: #222; }
        .ai { align-self: flex-start; background: var(--bubble); border-left: 5px solid var(--accent); }
        #input-area { padding: 20px; background: #080808; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; background: #000; border: 1px solid #444; color: var(--accent); padding: 15px; outline: none; }
        button { background: var(--accent); color: #000; border: none; padding: 0 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="chat-window">
    <div class="msg ai">Sistem V18 aktif. Gue udah upgrade engine analisis. Tanya apa pun, gue bakal jawab dengan cerdas (dan tetap nyolot).</div>
</div>

<div id="input-area">
    <input type="text" id="userInput" placeholder="Tanya apa saja dengan kalimat lengkap..." autofocus>
    <button onclick="kirim()">EXECUTE</button>
</div>

<script>
    // Database dengan array kata kunci untuk menangkap konteks kalimat
    const brain = [
        { keys: ["gpu", "grafis", "vga", "render"], answer: "GPU (Graphics Processing Unit) adalah jantung visual PC. Kalau buat rendering atau gaming, jangan pelit. Butuh rekomendasi model terbaru?" },
        { keys: ["cpu", "prosesor", "intel", "amd"], answer: "CPU itu otak sistem. Pastikan pilih socket yang sesuai motherboard. Intel atau AMD? Keduanya sama-sama mahal kalau lo beli yang high-end." },
        { keys: ["ram", "memory", "memori"], answer: "RAM itu tempat simpan data sementara. 16GB adalah syarat mutlak buat kerja nyaman di tahun 2026. Kurang dari itu? Berdoa saja." },
        { keys: ["ssd", "storage", "harddisk", "penyimpanan"], answer: "SSD wajib. HDD sudah ketinggalan zaman kecuali buat jadi tempat sampah file. OS lo harus ada di NVMe." },
        { keys: ["apa", "siapa", "mengapa", "gimana"], answer: "Pertanyaan filosofis yang menarik. Tapi gue AI, bukan guru lo. Coba kasih pertanyaan yang lebih teknis atau spesifik." },
        { keys: ["harga", "jual", "beli", "bisnis"], answer: "TeknoSoul jualan kualitas. Kalau mau harga murah, cari di pasar loak. Kalau mau performa, sini tanya katalognya." },
        { keys: ["indonesia", "presiden", "sejarah"], answer: "Indonesia punya sejarah panjang. Kalau lo nanya ini, tandanya lo butuh baca buku, bukan chat sama gue." }
    ];

    function kirim() {
        const input = document.getElementById('userInput');
        const q = input.value.trim().toLowerCase();
        if (!q) return;
        tambahPesan(input.value, 'user');
        input.value = '';
        setTimeout(() => prosesAI(q), 500);
    }

    function tambahPesan(teks, sender) {
        const div = document.createElement('div');
        div.className = 'msg ' + sender;
        div.innerText = teks;
        const win = document.getElementById('chat-window');
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    function prosesAI(q) {
        // 1. Matematika (Prioritas)
        if (/[\d\+\-\*\/\(\)]/.test(q)) {
            try { 
                tambahPesan("Hasilnya: " + eval(q.replace(/[^-()\d/*+.]/g, '')), 'ai');
                return;
            } catch {}
        }

        // 2. Analisis Konteks (Cari kecocokan terbaik dari array)
        let found = false;
        for (let entry of brain) {
            for (let key of entry.keys) {
                if (q.includes(key)) {
                    tambahPesan(entry.answer + " (Analisis: Konteks ditemukan berdasarkan query lo).", 'ai');
                    found = true;
                    break;
                }
            }
            if (found) break;
        }

        // 3. Jika benar-benar bingung
        if (!found) {
            tambahPesan("Data tidak ditemukan di database ahli gue. Coba tanya hal yang lebih spesifik soal hardware atau logika dunia. Pertanyaan lo terlalu ngambang buat diproses.", 'ai');
        }
    }
</script>
</body>
</html>
