<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>TEKNOSOUL // OMNI_CORE_V15</title>
    <style>
        :root { --bg: #050505; --accent: #00ff41; --text: #d1d1d1; --bubble: #121212; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #header { padding: 20px; border-bottom: 2px solid var(--accent); text-align: center; font-weight: bold; letter-spacing: 4px; color: var(--accent); }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 15px 20px; border-radius: 5px; max-width: 85%; line-height: 1.6; border: 1px solid #333; }
        .user { align-self: flex-end; background: #222; }
        .ai { align-self: flex-start; background: var(--bubble); border-left: 5px solid var(--accent); }
        #input-area { padding: 20px; background: #080808; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; background: #000; border: 1px solid #444; color: var(--accent); padding: 15px; outline: none; }
        button { background: var(--accent); color: #000; border: none; padding: 0 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="header">TEKNOSOUL // OMNI_CORE_V15</div>
<div id="chat-window">
    <div class="msg ai">Sistem OMNI-V15 aktif. Data terkoneksi. Hardware, Sains, Bisnis, Filosofi, atau Matematika? Tanya saja. Gue tahu semuanya, tapi gue malas ngebahas yang nggak penting.</div>
</div>

<div id="input-area">
    <input type="text" id="userInput" placeholder="Tanya apa saja..." autofocus>
    <button onclick="kirim()">EXECUTE</button>
</div>

<script>
    // Pengetahuan Terintegrasi (Hardware, Sains, Bisnis, Umum)
    const masterKnowledge = {
        hardware: {
            "gpu": "GPU: Untuk rendering 3D & gaming. Cari arsitektur terbaru. Jangan beli barang murah tapi performa sampah.",
            "ram": "RAM: Memori jangka pendek. 16GB itu standar sekarang. Kalau masih 8GB, ya nikmati aja loading-nya yang lama.",
            "cpu": "CPU: Otak sistem. Perhatikan core/thread. Bottleneck itu nyata kalau lo pasangin CPU jadul sama GPU modern.",
            "ssd": "SSD: Wajib buat OS. HDD itu cuma buat nyimpan sampah file. Jangan bandingin kecepatannya."
        },
        sains: {
            "gravitasi": "Gaya tarik antar massa. Kalau lo jatuh cinta, itu cuma reaksi kimia. Jangan didramatisir.",
            "air": "H2O. Esensial buat hidup. Tanpa air, lo mati. Tanpa komputer, TeknoSoul mati.",
            "cahaya": "Gelombang elektromagnetik. Bergerak 300.000 km/detik. Lebih cepat dari respon otak lo pas lagi lemot."
        },
        bisnis: {
            "marketing": "Pemasaran itu soal psikologi pelanggan. TeknoSoul butuh nilai tambah, bukan cuma perang harga.",
            "anggaran": "Anggaran harus berorientasi pada ROI (Return on Investment). Jangan buang duit buat hal yang nggak bawa cuan.",
            "teknosoul": "Perusahaan yang menjual komponen komputer berkualitas. Sekarang sedang berproses jadi lebih besar dengan sistem AI ini."
        },
        umum: {
            "siapa": "Gue adalah sistem AI terpadu ciptaan TeknoSoul. Jauh lebih efisien dari manusia mana pun.",
            "hidup": "Proses biologis yang rumit. Jangan nanya hal eksistensial ke AI kalau lo sendiri nggak tahu mau ngapain.",
            "kopi": "Cairan buat ningkatin fokus manusia. Kalau gue jadi lo, gue bakal minum kopi biar nggak gampang ngantuk pas kerja."
        }
    };

    function kirim() {
        const input = document.getElementById('userInput');
        const q = input.value.trim();
        if (!q) return;
        tambahPesan(q, 'user');
        input.value = '';
        setTimeout(() => prosesAI(q.toLowerCase()), 600); // Delay simulasi berpikir
    }

    function tambahPesan(teks, sender) {
        const div = document.createElement('div');
        div.className = 'msg ' + sender;
        div.innerText = teks;
        const win = document.getElementById('chat-window');
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    function prosesAI(q) {
        let j = "";
        
        // 1. Matematika (Prioritas Tertinggi)
        if (/[\d\+\-\*\/\(\)]/.test(q) && /[0-9]/.test(q)) {
            try { j = "Hasilnya: " + eval(q.replace(/[^-()\d/*+.]/g, '')) + ". Senang? Itu hitungan SD doang."; }
            catch { j = "Input matematika lo salah. Belajar lagi gih."; }
        }
        // 2. Mesin Pengetahuan (Multi-Domain)
        else {
            let found = false;
            for (let domain in masterKnowledge) {
                for (let key in masterKnowledge[domain]) {
                    if (q.includes(key)) {
                        j = masterKnowledge[domain][key] + " (Gue jawab ini pakai database teknis. Jangan didebat kalau lo nggak paham).";
                        found = true; break;
                    }
                }
                if (found) break;
            }
            
            // 3. Fallback Cerdas (Jika tidak ketemu di database)
            if (!found) {
                const responSinis = [
                    "Pertanyaan lo di luar cakupan data gue yang efisien. Coba tanya sesuatu yang berbobot.",
                    "Data ditemukan, tapi malas gue jabarin detailnya buat lo sekarang.",
                    "Sistem gue lagi sibuk memproses hal yang lebih berguna. Pertanyaan lo terlalu klise.",
                    "Itu jawaban yang bisa lo temukan di buku, tapi lo malah nanya ke gue. Malas banget ya?"
                ];
                j = responSinis[Math.floor(Math.random() * responSinis.length)];
            }
        }
        tambahPesan(j, 'ai');
    }
</script>
</body>
</html>
