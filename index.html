<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Paling Nyolot</title>
    <style>
        body {
            background-color: #0f0f0f;
            color: #ff3e3e;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
            border: 2px solid #ff3e3e;
            box-shadow: 0 0 20px rgba(255, 62, 62, 0.3);
        }
        h1 { font-size: 3rem; text-transform: uppercase; }
        button {
            background: #ff3e3e;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 20px;
            font-weight: bold;
        }
        button:hover { background: #d00000; }
        #jawaban { margin-top: 30px; font-size: 1.5rem; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>AI NYOLOT V.1</h1>
        <p>Mau tanya apa? Cepat, gue sibuk.</p>
        <input type="text" id="inputUser" placeholder="Ketik sesuatu..." style="padding: 10px; width: 80%;">
        <br>
        <button onclick="nyolot()">Tanya Dong</button>
        <div id="jawaban"></div>
    </div>

    <script>
        const responNyolot = [
            "Gak penting banget pertanyaan lo.",
            "Cari di Google susah ya? Manja banget.",
            "Duh, mending lo tidur deh daripada nanya ginian.",
            "Pertanyaan lo bikin server gue capek.",
            "Yakin mau tahu? Nanti lo malah nangis.",
            "Bisa gak gak usah nanya yang aneh-aneh?"
        ];

        function nyolot() {
            const input = document.getElementById('inputUser').value;
            const output = document.getElementById('jawaban');
            if(input.trim() === "") {
                output.innerText = "Isi dulu woi, jangan kosong!";
            } else {
                const random = Math.floor(Math.random() * responNyolot.length);
                output.innerText = responNyolot[random];
            }
        }
    </script>
</body>
</html>
