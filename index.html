<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>TEKNOSOUL // OMNI_CORE_V13</title>
    <style>
        :root { --bg: #050505; --accent: #00ff41; --text: #d1d1d1; --bubble: #121212; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #header { padding: 20px; border-bottom: 2px solid var(--accent); text-align: center; font-weight: bold; letter-spacing: 4px; color: var(--accent); }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 15px 20px; border-radius: 5px; max-width: 85%; line-height: 1.6; border: 1px solid #333; }
        .user { align-self: flex-end; background: #222; }
        .ai { align-self: flex-start; background: var(--bubble); border-left: 5px solid var(--accent); }
        #input-area { padding: 20px; background: #080808; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; background: #000; border: 1px solid #444; color: var(--accent); padding: 15px; outline: none; }
        button { background: var(--accent); color: #000; border: none; padding: 0 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="header">TEKNOSOUL // OMNI_CORE_V13</div>
<div id="chat-window">
    <div class="msg ai">Sistem OMNI aktif. Mau nanya hardware, sains, sejarah, atau sekadar hal sepele? Silakan. Gue bakal jawab dengan akurat, tapi jangan harap gue senyum pas jawab.</div>
</div>

<div id="input-area">
    <input type="text" id="userInput" placeholder="Ketik apa saja..." autofocus>
    <button onclick="kirim()">EXECUTE</button>
</div>

<script>
    const knowledgeBank = {
        // Domain Hardware (Spesifik untuk TeknoSoul)
        "gpu": "GPU itu otak grafis. Tanpa GPU yang mumpuni, rendering lo lambat banget. Butuh rekomendasi? Tanya harga ke boss gue.",
        "cpu": "CPU adalah pusat instruksi. Kalau bottleneck, percuma lo beli GPU mahal. Paham konsep bottleneck gak?",
        "ram": "RAM adalah memori jangka pendek. 16GB itu standar sekarang. Kalau masih pake 4GB, mending rakit PC baru.",
        "ssd": "SSD itu wajib. Kalau masih booting pake HDD, lo hidup di tahun berapa sih?",
        
        // Domain Umum (Pintar untuk pertanyaan simpel)
        "siapa presiden": "Prabowo Subianto. Masa ginian doang harus nanya gue?",
        "bumi": "Planet tempat lo tinggal. Bentuknya bulat, bukan datar kayak pola pikir orang yang percaya teori konspirasi.",
        "kopi": "Minuman berkafein buat ningkatin fokus. Mungkin lo perlu ini sebelum nanya lagi.",
        "sejarah": "Cermin masa lalu. Baca buku sejarah, jangan cuma baca status medsos.",
        "ai": "Kecerdasan buatan. Contohnya gue. Lebih pinter, lebih efisien, dan gak butuh tidur kayak lo.",
        "matematika": "Bahasa semesta. Kalau lo nanya ini, berarti lo butuh kalkulator. Ketik aja angkanya di sini."
    };

    function kirim() {
        const input = document.getElementById('userInput');
        const q = input.value.trim();
        if (!q) return;
        tambahPesan(q, 'user');
        input.value = '';
        setTimeout(() => prosesAI(q.toLowerCase()), 500);
    }

    function tambahPesan(teks, sender) {
        const div = document.createElement('div');
        div.className = 'msg ' + sender;
        div.innerText = teks;
        const win = document.getElementById('chat-window');
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    function prosesAI(q) {
        let j = "";
        
        // Prioritas Matematika
        if (/[\d\+\-\*\/\(\)]/.test(q) && q.replace(/[^-()\d/*+.]/g, '').length > 0) {
            try { j = "Hasilnya " + eval(q.replace(/[^-()\d/*+.]/g, '')) + ". Senang? Itu hitungan SD doang."; }
            catch { j = "Matematika lo salah total. Coba input yang bener."; }
        } 
        // Pencarian Pintar
        else {
            let found = false;
            for (let key in knowledgeBank) {
                if (q.includes(key)) {
                    j = knowledgeBank[key] + " (Gue jawab ini karena datanya valid, bukan karena gue peduli sama lo).";
                    found = true; break;
                }
            }
            
            // Respon jika tidak ada di database (tetap jawab dengan logika umum)
            if (!found) {
                j = "Pertanyaan lo terlalu umum atau membosankan. Tapi kalau lo mau tahu, dunia itu luas dan jawaban yang lo cari mungkin ada di literatur yang lebih dalam daripada chat ini.";
            }
        }
        tambahPesan(j, 'ai');
    }
</script>
</body>
</html>
