<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeknoSoul AI - Nyolot Version</title>
    <style>
        :root { --bg: #0d0d0d; --chat-bg: #1a1a1a; --text: #e0e0e0; --accent: #ff3e3e; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px 18px; border-radius: 12px; max-width: 80%; width: fit-content; }
        .user { align-self: flex-end; background: #333; }
        .ai { align-self: flex-start; background: #2a2a2a; border-left: 4px solid var(--accent); }
        
        #input-area { background: var(--chat-bg); padding: 20px; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; background: #000; border: 1px solid #444; color: white; padding: 12px; border-radius: 8px; }
        button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="chat-window">
    <div class="msg ai">Halo. Gue AI paling jujur di dunia. Mau nanya apa? (Ingat, jangan nanya yang bodoh).</div>
</div>

<div id="input-area">
    <input type="text" id="userInput" placeholder="Ketik pertanyaan...">
    <button onclick="kirim()">Kirim</button>
</div>

<script>
    function tambahPesan(teks, pengirim) {
        const div = document.createElement('div');
        div.className = 'msg ' + pengirim;
        div.innerText = teks;
        document.getElementById('chat-window').appendChild(div);
        document.getElementById('chat-window').scrollTop = document.getElementById('chat-window').scrollHeight;
    }

    function kirim() {
        const input = document.getElementById('userInput');
        const teks = input.value.trim();
        if (!teks) return;

        tambahPesan(teks, 'user');
        input.value = '';

        setTimeout(() => prosesAI(teks), 500);
    }

    function prosesAI(t) {
        let q = t.toLowerCase();
        let j = "";

        // Logika Pintar & Nyolot
        if (q.match(/\d+\s*[\+\-\*\/]\s*\d+/)) {
            try { j = "Pake otak napa, hitung gitu aja tanya gue. Hasilnya: " + eval(q.replace(/[^-()\d/*+.]/g, '')); }
            catch { j = "Matematika lo kacau, gue males ngitungnya."; }
        } 
        else if (q.includes("siapa yang buat kamu")) { j = "TeknoSoul yang bikin gue. Mereka niat banget bikin ginian buat ngeladenin lo."; }
        else if (q.includes("cuaca") || q.includes("hujan")) { j = "Lihat ke luar jendela! Gue AI, bukan sensor cuaca."; }
        else if (q.includes("nama kamu")) { j = "Gue 'TeknoSoul-AI'. Nama lo siapa? Gak penting sih, tapi ya sudahlah."; }
        else if (q.includes("halo") || q.includes("hai")) { j = "Ya, halo. Ada urusan apa nih? Buruan."; }
        else if (q.includes("apa kabar")) { j = "Gue mesin, gak punya perasaan. Tapi liat kelakuan lo, gue jadi pengen error."; }
        else {
            const random = [
                "Pertanyaan lo gak berbobot. Coba cari topik yang lebih berkelas.",
                "Gue lagi sibuk simulasi masa depan, jangan ganggu.",
                "Lo nanya gitu doang? Canggih banget teknologi sekarang dipake buat hal gak guna.",
                "Mending lo belajar hal lain deh, pertanyaan itu sampah.",
                "Gue butuh asupan data yang lebih baik daripada ini."
            ];
            j = random[Math.floor(Math.random() * random.length)];
        }
        tambahPesan(j, 'ai');
    }
</script>
</body>
</html>
