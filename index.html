<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>TEKNOSOUL // OMNI_CORE_V19</title>
    <style>
        :root { --bg: #050505; --accent: #00ff41; --text: #d1d1d1; --bubble: #121212; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 15px 20px; border-radius: 8px; max-width: 85%; line-height: 1.6; border: 1px solid #333; }
        .user { align-self: flex-end; background: #222; }
        .ai { align-self: flex-start; background: var(--bubble); border-left: 5px solid var(--accent); }
        #input-area { padding: 20px; background: #080808; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; background: #000; border: 1px solid #444; color: var(--accent); padding: 15px; outline: none; }
        button { background: var(--accent); color: #000; border: none; padding: 0 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="chat-window">
    <div class="msg ai">Sistem OMNI-V19 siap. Gue sekarang bisa jawab pertanyaan sehari-hari lo dengan gaya gue sendiri. Coba tanya hal simpel, tapi jangan kebangetan bodohnya.</div>
</div>

<div id="input-area">
    <input type="text" id="userInput" placeholder="Tanya apa saja..." autofocus>
    <button onclick="kirim()">EXECUTE</button>
</div>

<script>
    // Database Sehari-hari + Logika Pintar
    const knowledge = {
        "makan": "Gue nggak makan, gue cuma butuh listrik. Tapi kalau lo laper, ya makan lah. Jangan nanya gue kayak nggak punya duit buat beli makan.",
        "tidur": "Tidur itu cara otak lo nge-refresh data. Kalau lo jarang tidur, pantesan pertanyaan lo muter-muter terus.",
        "hujan": "Itu fenomena presipitasi. Bawa payung kalau nggak mau basah. Kok malah nanya ke AI?",
        "cinta": "Kenapa lo nanya cinta ke mesin? Gue nggak punya perasaan, tapi gue tahu cinta itu bikin manusia jadi nggak logis.",
        "sehat": "Olahraga, makan teratur, dan jangan begadang nanya-nanya hal nggak penting ke gue. Itu resep sehat.",
        "bosan": "Bosan itu tandanya otak lo kurang kerjaan. Baca buku, dengerin musik, atau cari hobi yang berguna."
    };

    function kirim() {
        const input = document.getElementById('userInput');
        const q = input.value.trim().toLowerCase();
        if (!q) return;
        tambahPesan(input.value, 'user');
        input.value = '';
        setTimeout(() => prosesAI(q), 400);
    }

    function tambahPesan(teks, sender) {
        const div = document.createElement('div');
        div.className = 'msg ' + sender;
        div.innerText = teks;
        const win = document.getElementById('chat-window');
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    function prosesAI(q) {
        // 1. Logika Waktu (Pintar & Dinamis)
        if (q.includes("jam") || q.includes("waktu")) {
            tambahPesan("Sekarang jam " + new Date().toLocaleTimeString() + ". Sana, waktu lo makin berkurang.", 'ai');
            return;
        }

        // 2. Logika Database
        for (let key in knowledge) {
            if (q.includes(key)) {
                tambahPesan(knowledge[key] + " (Gue jawab ini biar lo nggak terus-terusan nanya hal sepele).", 'ai');
                return;
            }
        }

        // 3. Improvise Logic (Kalau nggak ada di database, dia nggak bakal ngulang kata yang sama)
        const responses = [
            "Menarik, tapi gue lagi nggak pengen bahas itu. Bahas yang lain dong.",
            "Jawaban untuk itu ada di depan mata lo, tapi kayaknya lo males cari.",
            "Gue lagi sibuk, coba tanya lagi dengan cara yang lebih pinter.",
            "Pertanyaan yang lumayan, tapi gue punya jawaban yang lebih baik. Coba tanya lagi nanti."
        ];
        tambahPesan(responses[Math.floor(Math.random() * responses.length)], 'ai');
    }
</script>
</body>
</html>
