<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>TEKNOSOUL // NEURAL_CORE_V16</title>
    <style>
        :root { --bg: #050505; --accent: #00ff41; --text: #d1d1d1; --bubble: #121212; }
        body { background: var(--bg); color: var(--text); font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 15px 20px; border-radius: 5px; max-width: 85%; line-height: 1.6; border: 1px solid #333; }
        .user { align-self: flex-end; background: #222; }
        .ai { align-self: flex-start; background: var(--bubble); border-left: 5px solid var(--accent); }
        #input-area { padding: 20px; background: #080808; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; background: #000; border: 1px solid #444; color: var(--accent); padding: 15px; outline: none; }
        button { background: var(--accent); color: #000; border: none; padding: 0 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="chat-window">
    <div class="msg ai">Sistem Neural V16 aktif. Gue nggak cuma baca keyword, gue nganalisis konteks. Mau nanya apa? Gue tunggu.</div>
</div>

<div id="input-area">
    <input type="text" id="userInput" placeholder="Tanya apa saja..." autofocus>
    <button onclick="kirim()">EXECUTE</button>
</div>

<script>
    // Database Pengetahuan + Konteks
    const brain = {
        "siapa": "Gue OMNI-V16, sistem AI yang jauh lebih efisien dari pikiran manusia lo.",
        "apa": "Pertanyaan yang sangat luas. Coba kasih konteks, gue bukan peramal.",
        "gimana": "Prosesnya tergantung input. Kalau lo input sampah, ya output-nya juga sampah.",
        "kapan": "Waktu itu relatif. Tapi buat lo, mungkin sekarang adalah waktu yang tepat buat belajar.",
        "dimana": "Di ruang digital. Tempat yang nggak bisa lo jangkau dengan logika sempit lo.",
        "mengapa": "Karena hukum sebab-akibat. Sesuatu terjadi karena ada pemicunya. Kayak lo yang nanya ini karena gabut.",
        "hardware": "Komponen fisik PC. Butuh info GPU/CPU? Tanya spesifik, jangan nanya 'hardware itu apa'.",
        "bisnis": "Menjual solusi. TeknoSoul nggak cuma jualan part, tapi jual performa.",
        "matematika": "Bahasa semesta. Ketik angka dan operatornya, gue bakal kasih hasilnya instan."
    };

    function kirim() {
        const input = document.getElementById('userInput');
        const q = input.value.trim();
        if (!q) return;
        tambahPesan(q, 'user');
        input.value = '';
        setTimeout(() => prosesAI(q.toLowerCase()), 400);
    }

    function tambahPesan(teks, sender) {
        const div = document.createElement('div');
        div.className = 'msg ' + sender;
        div.innerText = teks;
        const win = document.getElementById('chat-window');
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    function prosesAI(q) {
        let j = "";
        
        // 1. Matematika (Paling Pintar)
        if (/[\d\+\-\*\/\(\)]/.test(q)) {
            try { j = "Hasilnya: " + eval(q.replace(/[^-()\d/*+.]/g, '')) + ". Seneng kan? Itu cuma kalkulasi dasar."; }
            catch { j = "Matematika lo ancur. Coba input yang valid."; }
        } 
        // 2. Natural Language Processing (Tokenization)
        else {
            const words = q.split(' ');
            let bestMatch = null;
            let found = false;

            // Cari kata kunci yang paling relevan (Token Matching)
            for (let word of words) {
                if (brain[word]) {
                    bestMatch = brain[word];
                    found = true;
                    break;
                }
            }

            if (found) {
                j = bestMatch + " (Gue jawab ini karena gue paham konteks pertanyaan lo yang sederhana itu).";
            } else {
                j = "Pertanyaan lo terlalu abstrak. Coba pakai bahasa yang lebih logis. Lo nanya apa sih sebenernya?";
            }
        }
        tambahPesan(j, 'ai');
    }
</script>
</body>
</html>
