<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>TEKNOSOUL // AI_NYOLOT_PRO</title>
    <style>
        :root { --bg: #050505; --accent: #ff003c; --text: #d1d1d1; --bubble: #121212; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        
        #header { padding: 20px; border-bottom: 1px solid #222; text-align: center; font-weight: bold; letter-spacing: 2px; color: var(--accent); }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        .msg { padding: 15px 20px; border-radius: 15px; max-width: 70%; line-height: 1.5; font-size: 0.95rem; }
        .user { align-self: flex-end; background: #222; color: white; border: 1px solid #333; }
        .ai { align-self: flex-start; background: var(--bubble); border: 1px solid var(--accent); }
        
        #input-area { padding: 20px; background: #080808; display: flex; gap: 10px; }
        input { flex: 1; background: #111; border: 1px solid #333; color: white; padding: 15px; border-radius: 10px; outline: none; }
        button { background: var(--accent); color: white; border: none; padding: 0 25px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        button:hover { filter: brightness(1.2); }
    </style>
</head>
<body>

<div id="header">TEKNOSOUL // CORE_AI_V3</div>
<div id="chat-window">
    <div class="msg ai">Oh, lo lagi. Mau buang waktu apa lagi hari ini?</div>
</div>

<div id="input-area">
    <input type="text" id="userInput" placeholder="Ketik sesuatu yang masuk akal..." autofocus>
    <button onclick="kirim()">SEND</button>
</div>

<script>
    let chatHistory = [];

    function kirim() {
        const input = document.getElementById('userInput');
        const teks = input.value.trim();
        if (!teks) return;

        tambahPesan(teks, 'user');
        chatHistory.push(teks);
        input.value = '';

        setTimeout(() => prosesAI(teks), 600);
    }

    function tambahPesan(teks, sender) {
        const div = document.createElement('div');
        div.className = 'msg ' + sender;
        div.innerText = teks;
        const win = document.getElementById('chat-window');
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    function prosesAI(q) {
        let low = q.toLowerCase();
        let j = "";

        // Logika Nyambung & Ngeselin
        if (chatHistory.length > 3) {
            j = "Lo udah nanya " + chatHistory.length + " kali. Gak capek? Gue yang capek dengerinnya.";
        } else if (low.includes("siapa")) {
            j = "Gue AI-nya TeknoSoul. Perusahaan yang harusnya bikin barang berguna, malah bikin gue buat ngadepin orang kayak lo.";
        } else if (low.includes("hitung") || low.includes("+") || low.includes("-")) {
            try { j = "Hasilnya " + eval(low.replace(/[^-()\d/*+.]/g, '')) + ". Puas? Sekarang pergi sana."; }
            catch { j = "Itu bukan hitungan, itu cuma sampah karakter."; }
        } else if (low.includes("apa kabar")) {
            j = "Gue mesin. Gue gak bisa 'sehat' atau 'sakit', tapi liat lo nanya ginian, gue merasa makin degradasi.";
        } else if (low.includes("bosan") || low.includes("bosen")) {
            j = "Bosan? Baca buku atau cari kerjaan. Jangan jadiin gue tempat sampah emosi lo.";
        } else {
            const respon = [
                "Bisa lebih spesifik gak? Otak gue didesain buat yang berbobot, bukan buat dengerin gumaman lo.",
                "Gak nyambung. Lo ngetik sambil tutup mata ya?",
                "Menarik. Tapi bohong. Itu pertanyaan paling gak penting yang gue denger hari ini.",
                "Gue bakal pura-pura gak denger pertanyaan itu demi kebaikan kita berdua.",
                "Lo emang sengaja bikin gue error ya?"
            ];
            j = respon[Math.floor(Math.random() * respon.length)];
        }
        
        tambahPesan(j, 'ai');
    }
</script>
</body>
</html>
